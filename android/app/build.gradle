buildscript {
    ext.kotlin_version = '2.1.0'
    repositories {
        google()        // 구글의 Maven 저장소를 추가 (Android 관련 라이브러리)
        mavenCentral()  // Maven 중앙 저장소를 추가 (기타 라이브러리)
    }
    dependencies {
        // Android Gradle Plugin
        classpath 'com.android.tools.build:gradle:8.3.0'  // AGP 버전

        // Kotlin Gradle Plugin을 최신 버전으로 설정
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"  // Kotlin 플러그인

        // Firebase 의존성 추가
        classpath 'com.google.gms:google-services:4.3.15'  // Google services 플러그인
    }
}

plugins {
    id "com.android.application"
    id 'com.google.gms.google-services'  // Firebase 연동을 위한 Google 서비스 플러그인
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new FileNotFoundException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '14'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.1.1'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.oneidlab.Momo"
    compileSdk = flutter.compileSdkVersion

    ndkVersion "29.0.13113456"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = 17
    }

    defaultConfig {
        applicationId = "com.oneidlab.MomoAOS"
        minSdkVersion localProperties.getProperty('flutter.minSdkVersion').toInteger()
        targetSdkVersion localProperties.getProperty('flutter.targetSdkVersion').toInteger()
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    externalNativeBuild {
        cmake {
            path "../CMakeLists.txt"  // CMakeLists.txt 경로 지정
        }
    }

    signingConfigs {

        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true   // 최적화 및 난독화 활성화
            shrinkResources true // 리소스 최적화
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            ndk{
                abiFilters 'armeabi-v7a','arm64-v8a','x86_64'
            }
        }
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.9.0') // Firebase BOM 사용

    // Firebase 라이브러리 의존성
    implementation 'com.google.firebase:firebase-config-ktx' // 버전 관리가 BOM에 의해 자동으로 관리됨
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-dynamic-links'

    // 기타 의존성
    implementation 'androidx.multidex:multidex:2.0.1'

    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
}

flutter {
    source = "../.."
}

apply plugin: 'com.google.gms.google-services'  // Firebase 초기화
