name: momo
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

#### 설정 또는 사용할 자원 등록하는 파일

version: 1.2.2+48

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  url_launcher: ^6.0.9
  flutter_html: ^3.0.0

  provider: ^6.1.2
  cupertino_icons: ^1.0.8

  # 음악 인식 관련
  permission_handler: ^11.3.1
  flutter_sound: ^9.28.0
  get: ^4.7.2

  # Firebase Core
  firebase_core: ^3.10.1

  # Firestore
  cloud_firestore: ^5.6.2

  # Firebase Authentication
  firebase_auth: ^5.4.1
  firebase_auth_web: ^5.13.7
  firebase_analytics: ^11.4.2

  shared_preferences: ^2.5.1
  device_info_plus: ^11.2.2

  # 앱 관리
  firebase_remote_config: ^5.4.0
  package_info_plus: ^8.0.0

  http: ^1.3.0
  json_annotation: ^4.9.0
  share_plus: ^10.1.4

  fl_chart: ^0.70.2
  intl: ^0.20.2
  smooth_page_indicator: ^1.2.0+3
  connectivity_plus: ^6.1.3
  fluttertoast: ^8.2.12

  # 이미지 로딩
  extended_image: ^9.1.0
  pub_semver: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3  # flutter_launcher_icons 패키지 추가
  flutter_native_splash: ^2.4.4

  build_runner: ^2.4.4  # 코드 자동 생성기
  json_serializable: ^6.7.1  # JSON 변환 자동 생성
  flutter_lints: ^5.0.0


flutter_native_splash:
  image: "assets/splash_image/splash_image.png"
  color: "#ffffff"

flutter_icons:
  android: true
  ios: true
  image_path: "assets/momo_assets/momo_icon.png"
  remove_alpha_ios: true

flutter:
  assets:
    - assets/
    - assets/momo_assets/
    - assets/splash_image/
    - pubspec.yaml


  fonts:
    - family: NotoSansKR-Black
      fonts:
        - asset: assets/fonts/NotoSansKR-Black.ttf
    - family: NotoSansKR-Bold
      fonts:
        - asset: assets/fonts/NotoSansKR-Bold.ttf
    - family: NotoSansKR-Medium
      fonts:
        - asset: assets/fonts/NotoSansKR-Medium.ttf
    - family: NotoSansKR-Regular
      fonts:
        - asset: assets/fonts/NotoSansKR-Regular.ttf

  uses-material-design: true

